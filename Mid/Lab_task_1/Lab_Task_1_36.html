<!DOCTYPE html>
<html lang="en">
<head>
    <title>Student Response Form</title>
</head>
<body>
    <form>
        <table>
            <tr>
                <td>Full Name: </td>
                <td>
                    <input type="text", placeholder="Enter Your Name">
                </td>
            </tr>
            <tr>
                <td>Email Address: </td>
                <td>
                    <input type="email", placeholder="Enter Your Email">
                </td>
            </tr>
            <tr>
                <td>
                    Preferred Internship :
                </td>
            </tr>
            <tr>
                <td>
                    <input type="radio" value="On-site" name="intern"> On-Site
                    <input type="radio"value="Remote" name="intern">Remote
                </td>
            </tr>
            <tr>
                <td>Internship Duration:</td>
                <td>
                    <select name="duration">
                        <option value="Weeks">6 Weeks</option>
                        <option value="Months">3 Months</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>
                    Skills of Interest
                </td>
            </tr>
            <tr>
                <td>
                <input type="checkbox" value="Web_Development" name="interest">Web Development
                <input type="checkbox" value="Data_Analysis" name="interest">Data Analysis
                <input type="checkbox" value="Mobile_Apps" name="interest">Mobile Apps
                </td>
            </tr>
            <tr>
                <td>
                    <input type="button" name="Submit_Button" value="Submit Button">
                </td>
            </tr>
        </table>
    </form>
</body>
</html>

</body>
</html>
