<!DOCTYPE html>

<html>
<head>
    <title>Information Form Validation</title>
</head>

<body>

<center>
    <h1>Information Form</h1>
</center>

<form onsubmit="return handlesubmit()">

    <label>Name:</label>
    <input type="text" id="name">
    <br><br>

    <label>Email:</label>
    <input type="text" id="email">
    <br><br>

    <label>Mobile Number:</label>
    <input type="text" id="mobile">
    <br><br>

    <label>Blood Group:</label>
    <select id="blood">
        <option value="">Select Blood Group</option>
        <option value="A+">A+</option>
        <option value="A-">A-</option>
        <option value="B+">B+</option>
        <option value="B-">B-</option>
        <option value="AB+">AB+</option>
        <option value="AB-">AB-</option>
        <option value="O+">O+</option>
        <option value="O-">O-</option>
    </select>
    <br><br>

    <label>Date of Birth:</label>
    <input type="date" id="dob">
    <br><br>

    <label>Message:</label>
    <textarea id="message"></textarea>
    <br>

    <p id="error" style="color:red;"></p>

    <button type="submit">Submit</button>

</form>

<script>

function handlesubmit()
{
    var name = document.getElementById("name").value;
    var email = document.getElementById("email").value;
    var mobile = document.getElementById("mobile").value;
    var blood = document.getElementById("blood").value;
    var dob = document.getElementById("dob").value;
    var message = document.getElementById("message").value;

    var error = document.getElementById("error");

    error.innerHTML = "";

   
    if(name === "")
    {
        error.innerHTML = "Name cannot be empty.";
        return false;
    }

    
    if(email.indexOf("@") == -1 || email.indexOf(".") == -1)
{
    error.innerHTML = "Please enter a valid Email.";
    return false;
}

   
    if(mobile.length != 11 || isNaN(mobile))
    {
        error.innerHTML = "Mobile number must be 11 digits.";
        return false;
    }

   
    if(blood === "")
    {
        error.innerHTML = "Please select your Blood Group.";
        return false;
    }

    
    if(dob === "")
    {
        error.innerHTML = "Please select your Date of Birth.";
        return false;
    }

   
    if(message.length < 10)
    {
        error.innerHTML = "Message must be at least 10 characters.";
        return false;
    }

    alert("Contact Form Submitted Successfully!\n\n" +
          "Name: " + name + "\n" +
          "Email: " + email + "\n" +
          "Mobile: " + mobile + "\n" +
          "Blood Group: " + blood + "\n" +
          "Date of Birth: " + dob + "\n" +
          "Message: " + message);

    return false;
}

</script>

</body>
</html>
